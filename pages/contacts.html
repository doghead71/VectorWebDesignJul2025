      <img src="../image/logo.png" alt="Logo" />

  <nav>

  <main>
    <section class="side-by-side">
      <div class="container">
        <h1>Welcome to Jamaica</h1>
        <h2>Get in Touch</h2>
      <p>We’d love to hear from you! Reach out using the details below:</p>
      <p><strong>Email:</strong> info@jamaica.com</p>
      <p><strong>Phone:</strong> +1 (876) 555-1234</p>
      <p><strong>Address:</strong> Kingston, Jamaica</p>
      </div>
    </section>

    <section class="side-by-side">
      <div class="Register">
        <h2>Register</h2>
        <form action="/submit-form" method="POST">
          <div class="register-item">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="register-item">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="register-item">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />
          </div>
          <button type="submit">Submit</button>
        </form>
      </div>
    </section>
  </main>
<body>
